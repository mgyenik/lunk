<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      padding: 12px 16px;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      margin-left: auto;
    }

    .connection-dot.connected { background: #22c55e; }
    .connection-dot.disconnected { background: #ef4444; }

    .status-bar {
      padding: 10px 16px;
      background: #f8f8f8;
      border-bottom: 1px solid #e5e5e5;
      font-size: 12px;
      color: #666;
    }

    .status-bar.saved {
      background: #f0fdf4;
      color: #166534;
    }

    .page-title {
      padding: 12px 16px;
      font-weight: 500;
      line-height: 1.4;
      border-bottom: 1px solid #f0f0f0;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-save {
      background: #111;
      color: #fff;
    }

    .btn-queue {
      background: #f0f0f0;
      color: #333;
    }

    .progress {
      padding: 12px 16px;
      display: none;
    }

    .progress.active { display: block; }

    .progress-bar {
      height: 3px;
      background: #e5e5e5;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #111;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .progress-text {
      margin-top: 6px;
      font-size: 11px;
      color: #888;
    }

    .result {
      padding: 12px 16px;
      display: none;
      font-size: 12px;
    }

    .result.active { display: block; }

    .result.success { color: #166534; background: #f0fdf4; }
    .result.error { color: #991b1b; background: #fef2f2; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LUNK</h1>
    <div id="connectionDot" class="connection-dot" title="Checking connection..."></div>
  </div>

  <div id="statusBar" class="status-bar">Checking page...</div>

  <div id="pageTitle" class="page-title"></div>

  <div id="actions" class="actions">
    <button id="btnSave" class="btn-save" disabled>Save</button>
    <button id="btnQueue" class="btn-queue" disabled>Read Later</button>
  </div>

  <div id="progress" class="progress">
    <div class="progress-bar">
      <div id="progressFill" class="progress-bar-fill"></div>
    </div>
    <div id="progressText" class="progress-text">Extracting content...</div>
  </div>

  <div id="result" class="result"></div>

  <script src="popup.js"></script>
</body>
</html>
