stages:
  - check
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  BUN_INSTALL: ${CI_PROJECT_DIR}/.bun
  TAURI_CLI_VERSION: "2"

# Cache Rust and bun dependencies
.rust-cache: &rust-cache
  cache:
    key: ${CI_JOB_NAME}
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
      - frontend/node_modules/
      - .bun/

# Base setup for Linux jobs that need Rust + bun + Tauri system deps
.linux-setup: &linux-setup
  image: rust:bookworm
  before_script:
    # System dependencies for Tauri (WebKit, GTK, AppIndicator)
    - apt-get update -qq
    - apt-get install -y -qq
        libwebkit2gtk-4.1-dev
        libgtk-3-dev
        libayatana-appindicator3-dev
        librsvg2-dev
        libssl-dev
        pkg-config
        wget
        file
        unzip
    # Install bun
    - |
      if [ ! -f "$BUN_INSTALL/bin/bun" ]; then
        curl -fsSL https://bun.sh/install | bash
      fi
    - export PATH="$BUN_INSTALL/bin:$PATH"
    # Install frontend dependencies
    - cd frontend && bun install --frozen-lockfile && cd ..

# ---------------------------------------------------------------------------
# CHECK STAGE
# ---------------------------------------------------------------------------

test:
  stage: check
  <<: *linux-setup
  <<: *rust-cache
  script:
    - cargo test -p lunk-core
    - cargo clippy --all-targets -- -D warnings
    - cd frontend && bun run check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# BUILD STAGE — runs on version tags (v0.1.0, v1.0.0, etc.)
# ---------------------------------------------------------------------------

build-linux-cli:
  stage: build
  <<: *linux-setup
  <<: *rust-cache
  script:
    - cargo build --release -p lunk-cli
    - strip target/release/lunk
    - mkdir -p artifacts
    - cp target/release/lunk artifacts/lunk-linux-x86_64
  artifacts:
    paths:
      - artifacts/lunk-linux-x86_64
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build-linux-app:
  stage: build
  <<: *linux-setup
  <<: *rust-cache
  script:
    - cargo install tauri-cli --version "^${TAURI_CLI_VERSION}" --locked || true
    - export PATH="$CARGO_HOME/bin:$PATH"
    - cd crates/lunk-app && cargo tauri build
    - mkdir -p ${CI_PROJECT_DIR}/artifacts
    # Collect Tauri bundles
    - cp ${CI_PROJECT_DIR}/target/release/bundle/deb/*.deb ${CI_PROJECT_DIR}/artifacts/ 2>/dev/null || true
    - cp ${CI_PROJECT_DIR}/target/release/bundle/appimage/*.AppImage ${CI_PROJECT_DIR}/artifacts/ 2>/dev/null || true
    - cp ${CI_PROJECT_DIR}/target/release/bundle/rpm/*.rpm ${CI_PROJECT_DIR}/artifacts/ 2>/dev/null || true
  artifacts:
    paths:
      - artifacts/*.deb
      - artifacts/*.AppImage
      - artifacts/*.rpm
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build-windows-cli:
  stage: build
  <<: *linux-setup
  <<: *rust-cache
  script:
    # Cross-compile CLI for Windows (no GUI deps needed)
    - rustup target add x86_64-pc-windows-gnu
    - apt-get install -y -qq gcc-mingw-w64-x86-64
    - cargo build --release -p lunk-cli --target x86_64-pc-windows-gnu
    - mkdir -p artifacts
    - cp target/x86_64-pc-windows-gnu/release/lunk.exe artifacts/lunk-windows-x86_64.exe
  artifacts:
    paths:
      - artifacts/lunk-windows-x86_64.exe
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# Windows Tauri app must be built on a native Windows runner.
# Uncomment this job if you have a Windows GitLab runner tagged 'windows'.
#
# build-windows-app:
#   stage: build
#   tags:
#     - windows
#   before_script:
#     - choco install rust -y
#     - powershell -Command "irm bun.sh/install.ps1 | iex"
#     - cd frontend && bun install --frozen-lockfile && cd ..
#     - cargo install tauri-cli --version "^2" --locked
#   script:
#     - cd crates/lunk-app && cargo tauri build
#     - mkdir artifacts
#     - copy target\release\bundle\msi\*.msi artifacts\
#     - copy target\release\bundle\nsis\*.exe artifacts\
#   artifacts:
#     paths:
#       - artifacts/*.msi
#       - artifacts/*.exe
#     expire_in: 30 days
#   rules:
#     - if: $CI_COMMIT_TAG =~ /^v/

build-extension:
  stage: build
  image: alpine:latest
  script:
    - apk add --no-cache zip
    - cd extension
    - zip -r ../artifacts/lunk-extension.zip . -x "*.git*"
    - cd ..
  artifacts:
    paths:
      - artifacts/lunk-extension.zip
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ---------------------------------------------------------------------------
# RELEASE STAGE
# ---------------------------------------------------------------------------

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-linux-cli
      artifacts: true
    - job: build-linux-app
      artifacts: true
    - job: build-windows-cli
      artifacts: true
    - job: build-extension
      artifacts: true
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "Lunk ${CI_COMMIT_TAG}"
    description: |
      ## Downloads

      | Platform | CLI | Desktop App | Extension |
      |----------|-----|-------------|-----------|
      | Linux x86_64 | `lunk-linux-x86_64` | `.deb` / `.AppImage` | - |
      | Windows x86_64 | `lunk-windows-x86_64.exe` | Build from source | - |
      | Chrome/Edge | - | - | `lunk-extension.zip` |

      ### Install CLI (Linux)
      ```
      curl -fsSL https://gitlab.com/mgyenik77/lunk/-/raw/main/scripts/install.sh | bash
      ```

      ### Install CLI (Windows PowerShell)
      ```
      irm https://gitlab.com/mgyenik77/lunk/-/raw/main/scripts/install.ps1 | iex
      ```
    assets:
      links:
        - name: "lunk-linux-x86_64 (CLI)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/lunk-linux-x86_64?job=build-linux-cli"
          filepath: "/binaries/lunk-linux-x86_64"
        - name: "lunk-windows-x86_64.exe (CLI)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/lunk-windows-x86_64.exe?job=build-windows-cli"
          filepath: "/binaries/lunk-windows-x86_64.exe"
        - name: "lunk-extension.zip (Chrome/Edge)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/lunk-extension.zip?job=build-extension"
          filepath: "/binaries/lunk-extension.zip"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
