name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: lunk-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/lunk
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lunk-windows-x86_64.exe
            binary: target/x86_64-pc-windows-msvc/release/lunk.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lunk-darwin-aarch64
            binary: target/aarch64-apple-darwin/release/lunk
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: lunk-darwin-x86_64
            binary: target/x86_64-apple-darwin/release/lunk

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build CLI
        run: cargo build --release -p lunk-cli --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 1

  build-app-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            file

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cd crates/lunk-app && cargo tauri build

      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: lunk-linux-deb
          path: target/release/bundle/deb/*.deb
          retention-days: 1

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: lunk-linux-appimage
          path: target/release/bundle/appimage/*.AppImage
          retention-days: 1

  build-app-macos:
    runs-on: macos-latest # arm64 runner; universal target builds for both architectures
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (universal binary)
        run: cd crates/lunk-app && cargo tauri build --target universal-apple-darwin

      - name: Upload dmg
        uses: actions/upload-artifact@v7
        with:
          name: lunk-macos-dmg
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 1

  build-app-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cd crates/lunk-app && cargo tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: lunk-windows-msi
          path: target/release/bundle/msi/*.msi
          retention-days: 1

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v7
        with:
          name: lunk-windows-nsis
          path: target/release/bundle/nsis/*.exe
          retention-days: 1

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package extension
        run: |
          mkdir -p artifacts
          cd extension
          zip -r ../artifacts/lunk-extension.zip . -x "*.git*"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lunk-extension
          path: artifacts/lunk-extension.zip
          retention-days: 1

  release:
    needs: [build-cli, build-app-linux, build-app-macos, build-app-windows, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # CLI binaries
          cp artifacts/lunk-linux-x86_64/lunk release/lunk-linux-x86_64
          cp artifacts/lunk-windows-x86_64.exe/lunk.exe release/lunk-windows-x86_64.exe
          cp artifacts/lunk-darwin-aarch64/lunk release/lunk-darwin-aarch64
          cp artifacts/lunk-darwin-x86_64/lunk release/lunk-darwin-x86_64
          # Desktop app bundles
          cp artifacts/lunk-linux-deb/*.deb release/ 2>/dev/null || true
          cp artifacts/lunk-linux-appimage/*.AppImage release/ 2>/dev/null || true
          cp artifacts/lunk-macos-dmg/*.dmg release/ 2>/dev/null || true
          cp artifacts/lunk-windows-msi/*.msi release/ 2>/dev/null || true
          cp artifacts/lunk-windows-nsis/*.exe release/ 2>/dev/null || true
          # Extension
          cp artifacts/lunk-extension/lunk-extension.zip release/
          ls -la release/

      # NOTE: softprops/action-gh-release v2 is still on node20 as of April 2026.
      # Monitor https://github.com/softprops/action-gh-release for node24 update.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            ### CLI (Linux/macOS)
            ```
            curl -fsSL https://raw.githubusercontent.com/mgyenik/lunk/main/scripts/install.sh | bash
            ```

            ### CLI (Windows PowerShell)
            ```
            irm https://raw.githubusercontent.com/mgyenik/lunk/main/scripts/install.ps1 | iex
            ```

            ### Desktop App
            Download the installer for your platform:
            - **macOS**: `.dmg` (universal — works on both Intel and Apple Silicon)
            - **Linux**: `.deb` or `.AppImage`
            - **Windows**: `.msi` or `.exe`

            > **macOS note**: The app is not code-signed. On first launch, right-click the app → Open → confirm.

            ### Chrome Extension
            Download `lunk-extension.zip`, unzip, then load as an unpacked extension in `chrome://extensions`.
